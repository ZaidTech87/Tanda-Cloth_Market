# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/cloth_marketplace?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Data@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# Upload directory
upload.path=uploads/

# JWT Configuration
jwt.secret=clothMarketplaceSecretKeyForJWTTokenGenerationAndValidation2024
jwt.expiration=86400000

# CORS Configuration
allowed.origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.com.clothmarket=DEBUG
logging.level.org.springframework.web=DEBUG
